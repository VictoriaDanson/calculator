<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Web 计算器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="auto">
  <div class="app-root">
    <div class="calculator-shell" aria-label="Web 计算器应用">
      <!-- 顶部标题和主题切换 -->
      <header class="app-header">
        <div>
          <h1 class="app-title">标准计算器</h1>
          <p class="app-subtitle">支持括号、幂、平方根与历史记录</p>
        </div>
        <button
          id="themeToggle"
          class="theme-toggle"
          type="button"
          aria-label="切换浅色/深色主题"
        >
          <span class="mode-indicator" aria-hidden="true">●</span>
          <span class="mode-label">跟随系统</span>
        </button>
      </header>

      <!-- 主体布局：左侧计算器，右侧历史 -->
      <main class="calculator-layout">
        <!-- 计算器主体 -->
        <section
          class="calculator"
          aria-label="计算器"
        >
          <!-- 显示区域 -->
          <div class="display" aria-live="polite" aria-atomic="true">
            <div
              id="expressionDisplay"
              class="display-expression"
            ></div>
            <div
              id="resultDisplay"
              class="display-result"
            ></div>
          </div>

          <!-- 按键区域 -->
          <div class="keypad" aria-label="计算器按键">
            <!-- 第一行：AC, DEL, ±, / -->
            <button
              class="key key-danger"
              data-action="clear"
              type="button"
            >
              AC
            </button>
            <button
              class="key key-danger"
              data-action="delete"
              type="button"
            >
              DEL
            </button>
            <button
              class="key key-operator"
              data-action="toggle-sign"
              type="button"
            >
              ±
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="/"
              type="button"
            >
              ÷
            </button>

            <!-- 第二行：7,8,9,* -->
            <button class="key" data-type="number" data-value="7" type="button">
              7
            </button>
            <button class="key" data-type="number" data-value="8" type="button">
              8
            </button>
            <button class="key" data-type="number" data-value="9" type="button">
              9
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="*"
              type="button"
            >
              ×
            </button>

            <!-- 第三行：4,5,6,- -->
            <button class="key" data-type="number" data-value="4" type="button">
              4
            </button>
            <button class="key" data-type="number" data-value="5" type="button">
              5
            </button>
            <button class="key" data-type="number" data-value="6" type="button">
              6
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="-"
              type="button"
            >
              -
            </button>

            <!-- 第四行：1,2,3,+ -->
            <button class="key" data-type="number" data-value="1" type="button">
              1
            </button>
            <button class="key" data-type="number" data-value="2" type="button">
              2
            </button>
            <button class="key" data-type="number" data-value="3" type="button">
              3
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="+"
              type="button"
            >
              +
            </button>

            <!-- 第五行：(, ), %, ^ -->
            <button
              class="key key-operator"
              data-type="parenthesis"
              data-value="("
              type="button"
            >
              (
            </button>
            <button
              class="key key-operator"
              data-type="parenthesis"
              data-value=")"
              type="button"
            >
              )
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="%"
              type="button"
            >
              %
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="^"
              type="button"
            >
              ^
            </button>

            <!-- 第六行：0(占两格), ., √, =(占两格) -->
            <button
              class="key key-zero"
              data-type="number"
              data-value="0"
              type="button"
            >
              0
            </button>
            <button
              class="key"
              data-action="decimal"
              type="button"
            >
              .
            </button>
            <button
              class="key key-operator"
              data-action="sqrt"
              type="button"
            >
              √
            </button>
            <button
              class="key key-accent key-equal"
              data-action="equals"
              type="button"
            >
              =
            </button>
          </div>
        </section>

        <!-- 历史记录面板 -->
        <section
          class="history-panel collapsed"
          id="historyPanel"
          aria-label="历史记录"
        >
          <header class="history-header" id="historyHeader">
            <div class="history-header-main">
              <h2 class="history-title">历史记录</h2>
              <p class="history-subtitle">最多保留最近 10 条，可点击重算</p>
            </div>
            <div class="history-actions">
              <button
                id="historyClearButton"
                class="history-clear-button"
                type="button"
              >
                清空
              </button>
              <div class="history-toggle-icon" aria-hidden="true">▾</div>
            </div>
          </header>
          <div class="history-body">
            <ul class="history-list" id="historyList"></ul>
            <div class="history-empty" id="historyEmptyText">
              暂无历史记录。
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
