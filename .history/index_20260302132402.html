<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Web 计算器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 
     * 基础设计说明：
     * - 使用 CSS 变量统一管理颜色/尺寸，方便主题切换和后期维护
     * - 采用扁平化设计，按钮有按压动画，显示区有渐变背景
     * - 使用响应式布局，适配手机到桌面端
     */

    /* ===== CSS 变量：默认（浅色）主题 ===== */
    :root {
      /* 颜色相关（浅色默认：参考示例图片的柔和蓝灰配色） */
      --color-bg: #e9edf7; /* 整体背景：偏冷的浅蓝灰 */
      --color-bg-elevated: #f7f8ff; /* 计算器主体：略亮一点的蓝灰 */
      --color-bg-display-top: #ffffff; /* 显示区渐变起点：纯白 */
      --color-bg-display-bottom: #fdfdff; /* 显示区渐变终点：接近白色 */
      --color-border-subtle: rgba(15, 23, 42, 0.06);
      --color-text: #111827;
      --color-text-soft: #6b7280;
      --color-text-inverse: #ffffff;
      --color-key-bg: #ffffff; /* 数字键：白色按钮 */
      --color-key-bg-operator: #e4e7f2; /* 运算符 & 功能键：淡灰蓝 */
      --color-key-bg-accent: #4169ff; /* “=” 号：鲜明的蓝色 */
      --color-key-bg-danger: #ffb02a; /* AC / DEL：橙色 */
      --color-key-text-danger: #ffffff; /* 橙色按钮上的白字 */
      --color-key-shadow: rgba(15, 23, 42, 0.18);
      --color-history-bg: #f3f5ff;

      /* 尺寸与圆角 */
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;

      /* 阴影 */
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.12);

      /* 动画过渡 */
      --transition-fast: 0.15s ease-out;
      --transition-normal: 0.2s ease;

      /* 字体 */
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    /* ===== 跟随系统：深色主题下的变量覆盖（自动模式） ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #020617;
        --color-bg-elevated: #020617;
        --color-bg-display-top: #0f172a;
        --color-bg-display-bottom: #1d4ed8;
        --color-border-subtle: rgba(148, 163, 184, 0.2);
        --color-text: #e5e7eb;
        --color-text-soft: #9ca3af;
        --color-text-inverse: #f9fafb;
        --color-key-bg: #111827;
        --color-key-bg-operator: #1f2937;
        --color-key-bg-accent: #4f46e5;
        --color-key-bg-danger: #7f1d1d;
        --color-key-text-danger: #fecaca;
        --color-key-shadow: rgba(0, 0, 0, 0.5);
        --color-history-bg: #020617;
      }
    }

    /* ===== 用户手动选择主题时的覆盖（优先级更高） ===== */
    [data-theme="light"] {
      --color-bg: #e9edf7;
      --color-bg-elevated: #f7f8ff;
      --color-bg-display-top: #ffffff;
      --color-bg-display-bottom: #fdfdff;
      --color-border-subtle: rgba(15, 23, 42, 0.06);
      --color-text: #111827;
      --color-text-soft: #6b7280;
      --color-text-inverse: #ffffff;
      --color-key-bg: #ffffff;
      --color-key-bg-operator: #e4e7f2;
      --color-key-bg-accent: #4169ff;
      --color-key-bg-danger: #ffb02a;
      --color-key-text-danger: #ffffff;
      --color-key-shadow: rgba(15, 23, 42, 0.18);
      --color-history-bg: #f3f5ff;
    }

    [data-theme="dark"] {
      --color-bg: #020617;
      --color-bg-elevated: #020617;
      --color-bg-display-top: #0f172a;
      --color-bg-display-bottom: #1d4ed8;
      --color-border-subtle: rgba(148, 163, 184, 0.2);
      --color-text: #e5e7eb;
      --color-text-soft: #9ca3af;
      --color-text-inverse: #f9fafb;
      --color-key-bg: #111827;
      --color-key-bg-operator: #1f2937;
      --color-key-bg-accent: #4f46e5;
      --color-key-bg-danger: #7f1d1d;
      --color-key-text-danger: #fecaca;
      --color-key-shadow: rgba(0, 0, 0, 0.5);
      --color-history-bg: #020617;
    }

    /* ===== 全局基础样式 ===== */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      background: radial-gradient(circle at top, #dee5ff 0, var(--color-bg) 55%);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .app-root {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ===== 主容器布局 ===== */
    .calculator-shell {
      width: 100%;
      max-width: 920px;
      background: rgba(248, 250, 255, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--color-border-subtle);
      padding: 18px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* 深色模式下外层容器调整透明度 */
    [data-theme="dark"] .calculator-shell,
    @media (prefers-color-scheme: dark) {
      [data-theme="auto"] .calculator-shell {
        background: rgba(15, 23, 42, 0.96);
      }
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .app-title {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .app-subtitle {
      margin: 0;
      font-size: 0.78rem;
      color: var(--color-text-soft);
    }

    /* 主题切换按钮 */
    .theme-toggle {
      border: 0;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--color-key-bg);
      color: var(--color-text);
      font-size: 0.78rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background var(--transition-fast),
        transform var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: 0 6px 12px var(--color-key-shadow);
      white-space: nowrap;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
    }

    .theme-toggle:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px var(--color-key-shadow);
    }

    .theme-toggle span.mode-label {
      font-weight: 500;
    }

    .theme-toggle span.mode-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.06);
      font-size: 0.7rem;
    }

    /* ===== 主体：计算器 + 历史面板 ===== */
    .calculator-layout {
      display: grid;
      grid-template-columns: minmax(0, 360px) minmax(260px, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    /* 小屏幕下纵向排列 */
    @media (max-width: 768px) {
      .calculator-shell {
        max-width: 480px;
      }

      .calculator-layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    /* ===== 计算器主体 ===== */
    .calculator {
      background: var(--color-bg-elevated);
      border-radius: var(--radius-lg);
      padding: 16px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 显示区域：表达式 + 结果，带渐变背景 */
    .display {
      border-radius: 18px;
      padding: 12px 14px 14px;
      background: linear-gradient(
        145deg,
        var(--color-bg-display-top),
        var(--color-bg-display-bottom)
      );
      color: var(--color-text);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      border: 1px solid var(--color-border-subtle);
      min-height: 82px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .display-expression {
      font-size: 0.9rem;
      opacity: 0.88;
      min-height: 1.2em;
      word-break: break-all;
    }

    .display-result {
      margin-top: 6px;
      font-size: 1.6rem;
      font-weight: 600;
      text-align: right;
      word-break: break-all;
    }

    /* 键盘区域：网格布局 */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 4px;
    }

    .key {
      border: none;
      border-radius: var(--radius-md);
      padding: 0;
      min-height: clamp(46px, 8vh, 64px);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--color-key-bg);
      color: var(--color-text);
      box-shadow: 0 8px 14px var(--color-key-shadow);
      transition: transform var(--transition-fast),
        box-shadow var(--transition-fast),
        background var(--transition-fast),
        color var(--transition-fast),
        filter var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .key:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 3px 6px var(--color-key-shadow);
      filter: brightness(0.95);
    }

    .key-operator {
      background: var(--color-key-bg-operator);
    }

    .key-accent {
      background: var(--color-key-bg-accent);
      color: var(--color-text-inverse);
    }

    .key-danger {
      background: var(--color-key-bg-danger);
      color: var(--color-key-text-danger);
      font-weight: 600;
    }

    .key-zero {
      grid-column: span 2;
    }

    .key-equal {
      grid-column: span 2;
    }

    .key:focus-visible {
      outline: 2px solid rgba(59, 130, 246, 0.9);
      outline-offset: 2px;
    }

    /* ===== 历史记录面板 ===== */
    .history-panel {
      background: var(--color-history-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .history-header {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    .history-header-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-title {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .history-subtitle {
      margin: 0;
      font-size: 0.78rem;
      color: var(--color-text-soft);
    }

    .history-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-toggle-icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1px solid var(--color-border-subtle);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      transition: transform var(--transition-normal),
        background var(--transition-fast);
      background: rgba(0, 0, 0, 0.02);
    }

    .history-panel.collapsed .history-toggle-icon {
      transform: rotate(-90deg);
    }

    .history-clear-button {
      border: none;
      background: transparent;
      color: var(--color-text-soft);
      font-size: 0.78rem;
      padding: 4px 6px;
      border-radius: 999px;
      cursor: pointer;
      transition: background var(--transition-fast),
        color var(--transition-fast);
      white-space: nowrap;
    }

    .history-clear-button:hover {
      background: rgba(148, 163, 184, 0.15);
      color: var(--color-text);
    }

    .history-body {
      border-top: 1px solid var(--color-border-subtle);
      max-height: 260px;
      overflow-y: auto;
      padding: 6px 2px 8px 8px;
      transition: max-height var(--transition-normal);
    }

    .history-panel.collapsed .history-body {
      display: none;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 0.86rem;
    }

    .history-item {
      padding: 6px 8px;
      margin-right: 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background var(--transition-fast),
        transform var(--transition-fast);
    }

    .history-item:hover {
      background: rgba(148, 163, 184, 0.2);
      transform: translateY(-1px);
    }

    .history-item-expression {
      color: var(--color-text-soft);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .history-item-result {
      font-weight: 500;
      text-align: right;
    }

    .history-empty {
      padding: 10px 10px 12px;
      font-size: 0.82rem;
      color: var(--color-text-soft);
    }

    /* ===== 响应式细节调整 ===== */
    @media (max-width: 480px) {
      .calculator-shell {
        padding: 14px 12px 16px;
        border-radius: 18px;
      }

      .display-result {
        font-size: 1.4rem;
      }

      .key {
        font-size: 0.95rem;
        min-height: 44px;
      }
    }

    @media (min-width: 1024px) {
      .display {
        min-height: 96px;
      }

      .display-result {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body data-theme="auto">
  <div class="app-root">
    <div class="calculator-shell" aria-label="Web 计算器应用">
      <!-- 顶部标题和主题切换 -->
      <header class="app-header">
        <div>
          <h1 class="app-title">标准计算器</h1>
          <p class="app-subtitle">支持括号、幂、平方根与历史记录</p>
        </div>
        <button
          id="themeToggle"
          class="theme-toggle"
          type="button"
          aria-label="切换浅色/深色主题"
        >
          <span class="mode-indicator" aria-hidden="true">●</span>
          <span class="mode-label">跟随系统</span>
        </button>
      </header>

      <!-- 主体布局：左侧计算器，右侧历史 -->
      <main class="calculator-layout">
        <!-- 计算器主体 -->
        <section
          class="calculator"
          aria-label="计算器"
        >
          <!-- 显示区域 -->
          <div class="display" aria-live="polite" aria-atomic="true">
            <div
              id="expressionDisplay"
              class="display-expression"
            ></div>
            <div
              id="resultDisplay"
              class="display-result"
            ></div>
          </div>

          <!-- 按键区域 -->
          <div class="keypad" aria-label="计算器按键">
            <!-- 第一行：AC, DEL, ±, / -->
            <button
              class="key key-danger"
              data-action="clear"
              type="button"
            >
              AC
            </button>
            <button
              class="key key-danger"
              data-action="delete"
              type="button"
            >
              DEL
            </button>
            <button
              class="key key-operator"
              data-action="toggle-sign"
              type="button"
            >
              ±
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="/"
              type="button"
            >
              ÷
            </button>

            <!-- 第二行：7,8,9,* -->
            <button class="key" data-type="number" data-value="7" type="button">
              7
            </button>
            <button class="key" data-type="number" data-value="8" type="button">
              8
            </button>
            <button class="key" data-type="number" data-value="9" type="button">
              9
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="*"
              type="button"
            >
              ×
            </button>

            <!-- 第三行：4,5,6,- -->
            <button class="key" data-type="number" data-value="4" type="button">
              4
            </button>
            <button class="key" data-type="number" data-value="5" type="button">
              5
            </button>
            <button class="key" data-type="number" data-value="6" type="button">
              6
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="-"
              type="button"
            >
              -
            </button>

            <!-- 第四行：1,2,3,+ -->
            <button class="key" data-type="number" data-value="1" type="button">
              1
            </button>
            <button class="key" data-type="number" data-value="2" type="button">
              2
            </button>
            <button class="key" data-type="number" data-value="3" type="button">
              3
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="+"
              type="button"
            >
              +
            </button>

            <!-- 第五行：(, ), %, ^ -->
            <button
              class="key key-operator"
              data-type="parenthesis"
              data-value="("
              type="button"
            >
              (
            </button>
            <button
              class="key key-operator"
              data-type="parenthesis"
              data-value=")"
              type="button"
            >
              )
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="%"
              type="button"
            >
              %
            </button>
            <button
              class="key key-operator"
              data-type="operator"
              data-value="^"
              type="button"
            >
              ^
            </button>

            <!-- 第六行：0(占两格), ., √, =(占两格) -->
            <button
              class="key key-zero"
              data-type="number"
              data-value="0"
              type="button"
            >
              0
            </button>
            <button
              class="key"
              data-action="decimal"
              type="button"
            >
              .
            </button>
            <button
              class="key key-operator"
              data-action="sqrt"
              type="button"
            >
              √
            </button>
            <button
              class="key key-accent key-equal"
              data-action="equals"
              type="button"
            >
              =
            </button>
          </div>
        </section>

        <!-- 历史记录面板 -->
        <section
          class="history-panel collapsed"
          id="historyPanel"
          aria-label="历史记录"
        >
          <header class="history-header" id="historyHeader">
            <div class="history-header-main">
              <h2 class="history-title">历史记录</h2>
              <p class="history-subtitle">最多保留最近 10 条，可点击重算</p>
            </div>
            <div class="history-actions">
              <button
                id="historyClearButton"
                class="history-clear-button"
                type="button"
              >
                清空
              </button>
              <div class="history-toggle-icon" aria-hidden="true">▾</div>
            </div>
          </header>
          <div class="history-body">
            <ul class="history-list" id="historyList"></ul>
            <div class="history-empty" id="historyEmptyText">
              暂无历史记录。
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    /*
     * 逻辑结构说明：
     * 1. UI 层：负责按钮、显示、历史列表、主题切换等 DOM 操作
     * 2. 表达式引擎：包含 token 化、中缀转后缀（RPN）、RPN 求值
     * 3. 状态管理：记录当前表达式、上一次结果、错误状态、历史记录等
     * 4. 输入处理：统一处理鼠标点击和键盘输入
     */

    // ========================
    // 全局状态 & DOM 引用
    // ========================
    const expressionDisplay = document.getElementById("expressionDisplay");
    const resultDisplay = document.getElementById("resultDisplay");
    const keypad = document.querySelector(".keypad");
    const historyPanel = document.getElementById("historyPanel");
    const historyHeader = document.getElementById("historyHeader");
    const historyList = document.getElementById("historyList");
    const historyEmptyText = document.getElementById("historyEmptyText");
    const historyClearButton = document.getElementById("historyClearButton");
    const themeToggleButton = document.getElementById("themeToggle");
    const rootElement = document.documentElement;

    // 当前输入的表达式字符串（内部表示，使用 sqrt，而不是 √）
    let currentExpression = "";
    // 上一次成功计算的数值结果（Number）
    let lastResultValue = null;
    // 当前是否处于“刚刚计算完”的状态（影响后续输入行为）
    let justEvaluated = false;
    // 当前是否存在错误（影响后续输入行为）
    let hasError = false;
    // 历史记录：数组，元素为 { expression: string, result: string }
    let historyItems = [];
    // 主题状态：'auto' | 'light' | 'dark'
    let themeMode = "auto";

    // ========================
    // 工具函数：显示更新 & 状态重置
    // ========================

    /**
     * 将内部表达式（含 sqrt）格式化为展示用字符串（显示为 √）
     */
    function formatExpressionForDisplay(expr) {
      if (!expr) return "";
      // 将 sqrt( 替换为 √(
      return expr.replace(/sqrt\(/g, "√(");
    }

    /**
     * 将结果数值格式化为字符串：
     * - 四舍五入到 6 位小数
     * - 去掉末尾多余 0 和小数点
     * - 若超出范围，则抛出溢出错误
     */
    function formatResult(value) {
      const MAX_ABS_VALUE = 1e12; // 自定义显示范围限制
      if (!isFinite(value)) {
        throw new Error("错误：结果不是有限数值");
      }
      if (Math.abs(value) > MAX_ABS_VALUE) {
        throw new Error("错误：结果超出显示范围");
      }

      const factor = 1e6;
      const rounded = Math.round(value * factor) / factor;
      let str = rounded.toFixed(6);
      // 去掉末尾多余的 0 和小数点
      str = str.replace(/\.?0+$/, "");
      return str;
    }

    /**
     * 同步更新表达式和结果在 UI 上的显示
     */
    function updateDisplays() {
      expressionDisplay.textContent = formatExpressionForDisplay(
        currentExpression
      );
      // 结果显示由计算函数或错误处理单独控制
    }

    /**
     * 清空所有状态（AC）
     */
    function clearAll() {
      currentExpression = "";
      lastResultValue = null;
      justEvaluated = false;
      hasError = false;
      expressionDisplay.textContent = "";
      resultDisplay.textContent = "";
    }

    /**
     * 删除最后一个字符（DEL）
     */
    function deleteLast() {
      if (!currentExpression || justEvaluated || hasError) {
        // 刚计算完或处于错误状态时，DEL 等同于清空结果
        clearAll();
        return;
      }
      currentExpression = currentExpression.slice(0, -1);
      updateDisplays();
    }

    /**
     * 为即将写入的输入做准备：
     * - 如果处于错误状态：清空并重新开始
     * - 如果刚完成一次计算：
     *   - 若输入的是运算符：在上次结果后继续运算
     *   - 若输入的是数字或小数点或函数：开始新的表达式
     */
    function prepareForNewInput({ isOperator }) {
      if (hasError) {
        currentExpression = "";
        resultDisplay.textContent = "";
        hasError = false;
        justEvaluated = false;
        return;
      }

      if (justEvaluated) {
        if (isOperator) {
          if (lastResultValue !== null) {
            currentExpression = String(lastResultValue);
          }
        } else {
          currentExpression = "";
          resultDisplay.textContent = "";
        }
        justEvaluated = false;
      }
    }

    /**
     * 追加数字字符到表达式
     */
    function appendDigit(digit) {
      prepareForNewInput({ isOperator: false });
      currentExpression += digit;
      updateDisplays();
    }

    /**
     * 追加运算符到表达式
     */
    function appendOperator(op) {
      prepareForNewInput({ isOperator: true });

      if (!currentExpression) {
        // 开头只能输入 + 或 -，作为一元正负号
        if (op === "+" || op === "-") {
          currentExpression += op;
          updateDisplays();
        }
        return;
      }

      const lastChar = currentExpression[currentExpression.length - 1];
      // 若最后一个字符已经是运算符，则替换
      if ("+-*/%^".includes(lastChar)) {
        currentExpression =
          currentExpression.slice(0, currentExpression.length - 1) + op;
      } else {
        currentExpression += op;
      }
      updateDisplays();
    }

    /**
     * 追加左/右括号
     */
    function appendParenthesis(paren) {
      const isOperator = false;
      prepareForNewInput({ isOperator });

      currentExpression += paren;
      updateDisplays();
    }

    /**
     * 追加小数点，防止当前数字中出现多个小数点
     */
    function appendDecimalPoint() {
      prepareForNewInput({ isOperator: false });
      // 找到最后一段数字（包括可能的前导负号）
      const match = currentExpression.match(/(?:^|[+\-*/%^(\s])(-?\d*\.?\d*)$/);
      if (match && match[1].includes(".")) {
        // 当前数字已经有小数点，忽略
        return;
      }
      if (!currentExpression || /[+\-*/%^(\s]$/.test(currentExpression)) {
        // 表达式为空或最后是运算符/左括号，则补 0.
        currentExpression += "0.";
      } else {
        currentExpression += ".";
      }
      updateDisplays();
    }

    /**
     * 插入平方根：内部表示为 sqrt(
     * 用户需要自己补右括号
     */
    function appendSqrt() {
      prepareForNewInput({ isOperator: false });
      // 如果前一个字符是数字或右括号，则默认插入乘号再跟 sqrt
      if (currentExpression && /[\d)]$/.test(currentExpression)) {
        currentExpression += "*";
      }
      currentExpression += "sqrt(";
      updateDisplays();
    }

    /**
     * 正负号切换：对当前表达式中最后一个数字部分取反
     */
    function toggleSign() {
      if (!currentExpression) return;

      prepareForNewInput({ isOperator: false });

      // 匹配末尾的数字（允许小数），不包含前面的运算符
      const numberMatch = currentExpression.match(/(\d*\.?\d+)(?!.*\d)/);
      if (!numberMatch) return;

      const number = numberMatch[1];
      const index = numberMatch.index;

      if (index === null || index === undefined) return;

      const before = currentExpression.slice(0, index);
      const after = currentExpression.slice(index + number.length);

      // 判断前面是否已经有一元负号
      const charBefore = before[before.length - 1];
      const isUnaryNegative =
        charBefore === "-" &&
        (before.length === 1 ||
          "+-*/%^(".includes(before[before.length - 2] || ""));

      if (isUnaryNegative) {
        // 已经是负数：去掉一元负号
        currentExpression =
          before.slice(0, before.length - 1) + number + after;
      } else {
        // 否则添加一元负号
        currentExpression = before + "-" + number + after;
      }

      updateDisplays();
    }

    // ========================
    // 表达式解析与计算（核心逻辑）
    // ========================

    /**
     * 将表达式字符串分解为 token 列表
     * 支持数字、小数、sqrt 函数、运算符和括号
     */
    function tokenize(expr) {
      const tokens = [];
      const pattern = /\s*([0-9]*\.?[0-9]+|sqrt|\+|\-|\*|\/|\^|%|\(|\))/g;
      let match;
      let lastIndex = 0;

      while ((match = pattern.exec(expr)) !== null) {
        if (match.index !== lastIndex) {
          // 存在无法识别的字符
          throw new Error("错误：表达式中包含非法字符");
        }
        tokens.push(match[1]);
        lastIndex = pattern.lastIndex;
      }

      if (lastIndex !== expr.length) {
        throw new Error("错误：表达式中包含非法字符");
      }

      return tokens;
    }

    /**
     * 中缀表达式转后缀（RPN）：
     * - 支持 + - * / % ^
     * - 支持一元负号（记作 'neg'）
     * - 支持 sqrt 函数
     */
    function infixToRPN(tokens) {
      const output = [];
      const opStack = [];

      const precedence = {
        "+": 1,
        "-": 1,
        "*": 2,
        "/": 2,
        "%": 2,
        "^": 3,
        neg: 4 // 一元负号优先级最高
      };

      const rightAssociative = {
        "^": true,
        neg: true
      };

      let prevType = "start"; // 标记前一个 token 类型，用于判断一元运算符

      for (const token of tokens) {
        if (!isNaN(token)) {
          // 数字
          output.push(token);
          prevType = "number";
        } else if (token === "sqrt") {
          opStack.push({ type: "func", value: "sqrt" });
          prevType = "func";
        } else if (token === "(") {
          opStack.push({ type: "paren", value: "(" });
          prevType = "paren";
        } else if (token === ")") {
          // 依次弹出直到遇到左括号
          let foundLeftParen = false;
          while (opStack.length > 0) {
            const top = opStack.pop();
            if (top.type === "paren" && top.value === "(") {
              foundLeftParen = true;
              // 若栈顶是函数，则也输出
              if (opStack.length > 0 && opStack[opStack.length - 1].type === "func") {
                output.push(opStack.pop().value);
              }
              break;
            } else {
              output.push(top.value);
            }
          }
          if (!foundLeftParen) {
            throw new Error("错误：括号不匹配");
          }
          prevType = "paren";
        } else if ("+-*/%^".includes(token)) {
          // 判断一元负号：出现在表达式开头，或者前面是运算符/左括号/函数
          let op = token;
          if (
            token === "-" &&
            (prevType === "start" ||
              prevType === "operator" ||
              prevType === "paren" ||
              prevType === "func")
          ) {
            op = "neg";
          }

          const o1 = op;
          while (opStack.length > 0) {
            const top = opStack[opStack.length - 1];
            if (top.type !== "op" && top.type !== "func") break;

            const o2 = top.value;
            if (
              (top.type === "op" &&
                ((rightAssociative[o1] && precedence[o1] < precedence[o2]) ||
                  (!rightAssociative[o1] &&
                    precedence[o1] <= precedence[o2]))) ||
              top.type === "func"
            ) {
              output.push(opStack.pop().value);
            } else {
              break;
            }
          }
          opStack.push({ type: "op", value: o1 });
          prevType = "operator";
        } else {
          throw new Error("错误：无法解析的符号");
        }
      }

      // 将栈中剩余运算符全部弹出
      while (opStack.length > 0) {
        const top = opStack.pop();
        if (top.type === "paren") {
          throw new Error("错误：括号不匹配");
        }
        output.push(top.value);
      }

      return output;
    }

    /**
     * 计算后缀（RPN）表达式
     */
    function evaluateRPN(rpn) {
      const stack = [];

      for (const token of rpn) {
        if (!isNaN(token)) {
          stack.push(parseFloat(token));
        } else if (token === "neg") {
          if (stack.length < 1) {
            throw new Error("错误：一元运算符缺少操作数");
          }
          const a = stack.pop();
          stack.push(-a);
        } else if (token === "sqrt") {
          if (stack.length < 1) {
            throw new Error("错误：平方根运算缺少操作数");
          }
          const a = stack.pop();
          if (a < 0) {
            throw new Error("错误：不能对负数开平方");
          }
          stack.push(Math.sqrt(a));
        } else if ("+-*/%^".includes(token)) {
          if (stack.length < 2) {
            throw new Error("错误：运算符缺少操作数");
          }
          const b = stack.pop();
          const a = stack.pop();
          let res;
          switch (token) {
            case "+":
              res = a + b;
              break;
            case "-":
              res = a - b;
              break;
            case "*":
              res = a * b;
              break;
            case "/":
              if (b === 0) {
                throw new Error("错误：除数不能为 0");
              }
              res = a / b;
              break;
            case "%":
              if (b === 0) {
                throw new Error("错误：取余除数不能为 0");
              }
              res = a % b;
              break;
            case "^":
              res = Math.pow(a, b);
              break;
            default:
              throw new Error("错误：未知运算符");
          }
          stack.push(res);
        } else {
          throw new Error("错误：无效的后缀表达式");
        }
      }

      if (stack.length !== 1) {
        throw new Error("错误：表达式不完整或多余");
      }
      return stack[0];
    }

    /**
     * 对外暴露的表达式求值方法：
     * - 负责组合 token 化、RPN 转换与求值
     */
    function evaluateExpression(expr) {
      if (!expr) {
        throw new Error("错误：表达式为空");
      }
      const tokens = tokenize(expr);
      const rpn = infixToRPN(tokens);
      const value = evaluateRPN(rpn);
      return value;
    }

    /**
     * 计算按钮处理：= 
     */
    function calculateResult() {
      if (!currentExpression) return;

      try {
        const value = evaluateExpression(currentExpression);
        const formatted = formatResult(value);
        resultDisplay.textContent = formatted;
        lastResultValue = value;
        justEvaluated = true;
        hasError = false;
        // 记录历史
        addHistoryItem(currentExpression, formatted);
      } catch (err) {
        // 错误提示：显示在结果区域，同时设置错误状态
        resultDisplay.textContent =
          err && err.message ? err.message : "错误：表达式无效";
        justEvaluated = false;
        hasError = true;
      }
    }

    // ========================
    // 历史记录管理
    // ========================

    /**
     * 新增一条历史记录（保留最近 10 条）
     */
    function addHistoryItem(expression, result) {
      const item = { expression, result };
      historyItems.push(item);
      if (historyItems.length > 10) {
        historyItems.shift();
      }
      renderHistory();
    }

    /**
     * 渲染历史记录列表
     */
    function renderHistory() {
      historyList.innerHTML = "";

      if (historyItems.length === 0) {
        historyEmptyText.style.display = "block";
        return;
      }

      historyEmptyText.style.display = "none";

      historyItems
        .slice()
        .reverse()
        .forEach((item, indexFromEnd) => {
          const li = document.createElement("li");
          li.className = "history-item";
          // 在 data-index 中记录在数组中的真实索引
          const realIndex = historyItems.length - 1 - indexFromEnd;
          li.dataset.index = String(realIndex);

          const exprDiv = document.createElement("div");
          exprDiv.className = "history-item-expression";
          exprDiv.textContent = formatExpressionForDisplay(item.expression);

          const resDiv = document.createElement("div");
          resDiv.className = "history-item-result";
          resDiv.textContent = item.result;

          li.appendChild(exprDiv);
          li.appendChild(resDiv);

          historyList.appendChild(li);
        });
    }

    /**
     * 清空历史记录
     */
    function clearHistory() {
      historyItems = [];
      renderHistory();
    }

    /**
     * 点击历史记录项：将其表达式重新填入并重新计算
     */
    function handleHistoryClick(event) {
      const target = event.target.closest(".history-item");
      if (!target) return;
      const index = Number(target.dataset.index);
      if (Number.isNaN(index) || !historyItems[index]) return;

      const item = historyItems[index];
      currentExpression = item.expression;
      updateDisplays();
      // 重新计算一次，保证逻辑一致
      calculateResult();
    }

    /**
     * 历史面板折叠/展开
     */
    function toggleHistoryPanel() {
      historyPanel.classList.toggle("collapsed");
    }

    /**
     * 根据屏幕宽度设置历史面板默认折叠状态：
     * - 手机（<=600px）默认折叠
     * - 更大屏幕默认展开
     */
    function initHistoryPanelState() {
      const isMobile = window.matchMedia("(max-width: 600px)").matches;
      if (isMobile) {
        historyPanel.classList.add("collapsed");
      } else {
        historyPanel.classList.remove("collapsed");
      }
    }

    // ========================
    // 主题切换逻辑
    // ========================

    /**
     * 初始化主题：从 localStorage 读取用户选择，否则默认为 auto（跟随系统）
     */
    function initTheme() {
      const stored = window.localStorage.getItem("calculator-theme-mode");
      if (stored === "light" || stored === "dark" || stored === "auto") {
        themeMode = stored;
      } else {
        themeMode = "auto";
      }
      applyTheme();
    }

    /**
     * 根据 themeMode 应用主题，并更新按钮文案
     */
    function applyTheme() {
      if (themeMode === "auto") {
        rootElement.setAttribute("data-theme", "auto");
      } else {
        rootElement.setAttribute("data-theme", themeMode);
      }

      // 更新按钮文案
      const labelSpan = themeToggleButton.querySelector(".mode-label");
      const indicatorSpan = themeToggleButton.querySelector(".mode-indicator");
      if (!labelSpan || !indicatorSpan) return;

      if (themeMode === "auto") {
        labelSpan.textContent = "跟随系统";
        indicatorSpan.textContent = "●";
      } else if (themeMode === "light") {
        labelSpan.textContent = "浅色模式";
        indicatorSpan.textContent = "日";
      } else {
        labelSpan.textContent = "深色模式";
        indicatorSpan.textContent = "夜";
      }
    }

    /**
     * 切换主题：auto -> light -> dark -> auto 循环
     */
    function cycleThemeMode() {
      if (themeMode === "auto") {
        themeMode = "light";
      } else if (themeMode === "light") {
        themeMode = "dark";
      } else {
        themeMode = "auto";
      }
      window.localStorage.setItem("calculator-theme-mode", themeMode);
      applyTheme();
    }

    // ========================
    // 键盘输入支持
    // ========================

    /**
     * 处理键盘按键
     */
    function handleKeyDown(event) {
      const key = event.key;

      // 数字
      if (key >= "0" && key <= "9") {
        appendDigit(key);
        return;
      }

      // 运算符
      if ("+-*/%^".includes(key)) {
        appendOperator(key);
        event.preventDefault();
        return;
      }

      // 括号
      if (key === "(" || key === ")") {
        appendParenthesis(key);
        event.preventDefault();
        return;
      }

      // 小数点
      if (key === ".") {
        appendDecimalPoint();
        event.preventDefault();
        return;
      }

      // 回车或等号：计算
      if (key === "Enter" || key === "=") {
        calculateResult();
        event.preventDefault();
        return;
      }

      // 退格：DEL
      if (key === "Backspace") {
        deleteLast();
        event.preventDefault();
        return;
      }

      // Esc：AC
      if (key === "Escape") {
        clearAll();
        event.preventDefault();
        return;
      }
    }

    // ========================
    // 事件绑定
    // ========================

    /**
     * 处理数字/运算符等按钮点击（使用事件代理）
     */
    function handleKeypadClick(event) {
      const button = event.target.closest(".key");
      if (!button) return;

      const action = button.dataset.action;
      const type = button.dataset.type;
      const value = button.dataset.value;

      if (action) {
        switch (action) {
          case "clear":
            clearAll();
            break;
          case "delete":
            deleteLast();
            break;
          case "toggle-sign":
            toggleSign();
            break;
          case "decimal":
            appendDecimalPoint();
            break;
          case "sqrt":
            appendSqrt();
            break;
          case "equals":
            calculateResult();
            break;
          default:
            break;
        }
        return;
      }

      if (type === "number") {
        appendDigit(value);
      } else if (type === "operator") {
        appendOperator(value);
      } else if (type === "parenthesis") {
        appendParenthesis(value);
      }
    }

    // ========================
    // 初始化
    // ========================

    function init() {
      // 初始化历史面板默认折叠状态
      initHistoryPanelState();

      // 渲染空历史
      renderHistory();

      // 初始化主题
      initTheme();

      // 绑定按键区域点击事件
      keypad.addEventListener("click", handleKeypadClick);

      // 历史记录：点击折叠/展开
      historyHeader.addEventListener("click", function (event) {
        // 避免点击“清空”按钮时也折叠
        if (event.target.closest("#historyClearButton")) return;
        toggleHistoryPanel();
      });

      // 历史记录：清空按钮
      historyClearButton.addEventListener("click", function (event) {
        event.stopPropagation(); // 防止触发折叠
        clearHistory();
      });

      // 历史记录：点击某一条记录
      historyList.addEventListener("click", handleHistoryClick);

      // 主题切换按钮
      themeToggleButton.addEventListener("click", cycleThemeMode);

      // 键盘输入
      document.addEventListener("keydown", handleKeyDown);

      // 窗口尺寸变化时，重新评估历史面板默认折叠状态（仅首次放大/缩小时有意义）
      window.addEventListener("resize", initHistoryPanelState);
    }

    // DOM 加载完成后初始化
    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
